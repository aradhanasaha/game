<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Quest 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff1d6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 16px;
    }
    #game-wrapper {
      position: relative;
      width: min(96vw, calc(96vh * 1.6667));
      max-width: 1400px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      pointer-events: none;
    }
    .touch-btn {
      position: absolute;
      width: 48px;
      height: 48px;
      background: rgba(194,24,91,0.45);
      border: 2px solid #f06292;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fce4ec;
      font-size: 18px;
      pointer-events: all;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (pointer: coarse) {
      #touch-controls { display: block; }
    }

    /* Mobile warning overlay */
    #mobile-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff1d6;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      font-family: 'Press Start 2P', monospace;
    }
    #mobile-warning .mw-emoji {
      font-size: 56px;
      margin-bottom: 28px;
      line-height: 1;
    }
    #mobile-warning .mw-title {
      font-size: 13px;
      color: #c2185b;
      line-height: 2;
      margin-bottom: 20px;
    }
    #mobile-warning .mw-sub {
      font-size: 8px;
      color: #e91e8c;
      line-height: 2.2;
    }
    @media (pointer: coarse) {
      #mobile-warning { display: flex; }
    }
  </style>
</head>
<body>
  <!-- Mobile warning (shown on touch devices) -->
  <div id="mobile-warning">
    <div class="mw-emoji">💻</div>
    <div class="mw-title">best experienced<br>on a laptop!</div>
    <div class="mw-sub">grab a computer<br>and come back 💗</div>
  </div>

  <div id="game-wrapper">
    <canvas id="game-canvas" width="700" height="420"></canvas>
    <div id="touch-controls"></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
