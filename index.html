<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Quest 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff1d6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 16px;
    }
    #game-wrapper {
      position: relative;
      width: min(96vw, calc(96vh * 1.6667));
      max-width: 1400px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      pointer-events: none;
    }
    .touch-btn {
      position: absolute;
      width: 48px;
      height: 48px;
      background: rgba(194,24,91,0.45);
      border: 2px solid #f06292;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fce4ec;
      font-size: 18px;
      pointer-events: all;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (pointer: coarse) {
      #touch-controls { display: block; }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="700" height="420"></canvas>
    <div id="touch-controls"></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
